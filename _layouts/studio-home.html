<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>McPuppy Studios</title>
  <meta name="description" content="McPuppy Studios — Animation, Chess, and Creativity">
  <link rel="icon" href="{{ '/assets/images/favicon.svg' | relative_url }}" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body class="studio-body">

  <!-- ── TRANSMISSION OVERLAY (first visit) ─────────────────── -->
  <div class="transmission-overlay" id="transmission-overlay">
    <div class="transmission-scanlines"></div>
    <div class="transmission-inner">
      <div class="transmission-line" id="t1"></div>
      <div class="transmission-line" id="t2"></div>
      <div class="transmission-line" id="t3"></div>
      <div class="transmission-headline" id="t-headline">McPuppy Studios</div>
      <div class="transmission-sub" id="t-sub">A Million Stories to Tell</div>
    </div>
    <div class="transmission-skip">click anywhere to skip</div>
  </div>

  <div class="studio-page">

    <div class="studio-welcome-bg" aria-hidden="true">WELCOME</div>

    <div class="studio-drifters">
      <a href="{{ '/characters/princess/' | relative_url }}" class="drift-piece" aria-label="Princess character page">♞</a>
      <a href="{{ '/locations/' | relative_url }}" class="drift-piece" aria-label="Locations">♛</a>
      <a href="{{ '/characters/' | relative_url }}" class="drift-piece" aria-label="All characters">♜</a>
      <a href="{{ '/podcast/' | relative_url }}" class="drift-piece" aria-label="Podcast">🎙</a>
      <a href="{{ '/blog/' | relative_url }}" class="drift-piece" aria-label="Blog">✍</a>
      <a href="{{ '/classified/' | relative_url }}" class="drift-piece" aria-label="???">✦</a>
    </div>

    <!-- About / Contact pinned top-right -->
    <a href="{{ '/about/' | relative_url }}" class="studio-corner-about">About / Contact</a>

    <!-- Logo pinned top-left -->
    <div class="studio-corner-logo">
      <img src="{{ '/assets/images/mcpuppy-logo-horizontal.svg' | relative_url }}"
           alt="McPuppy Studios"
           class="studio-corner-img">
    </div>

    <div class="studio-content">

      <!-- Tagline at top center (where logo was) -->
      <div class="studio-tagline" aria-hidden="true">
        <span class="tagline-word">Chess.</span>
        <span class="tagline-word">Blog.</span>
        <span class="tagline-word">Music.</span>
        <span class="tagline-word">Podcast.</span>
        <span class="tagline-word">Animation.</span>
        <span class="tagline-word tagline-main">
          <span class="tagline-main-studio">McPuppy Studios</span>
          <span class="tagline-main-tagline">A Million Stories to Tell</span>
        </span>
      </div>

      <div class="studio-quad-grid">

        <a href="{{ '/pjcc/' | relative_url }}" class="studio-quad">
          <span class="studio-quad-title">PJCC</span>
          <span class="studio-quad-sub">Princess &amp; the Journey<br>to Chess City</span>
        </a>

        <a href="{{ '/chess-lessons/' | relative_url }}" class="studio-quad">
          <span class="studio-quad-title">Chess Lessons</span>
        </a>

        <a href="{{ '/blog/' | relative_url }}" class="studio-quad">
          <span class="studio-quad-title">Podcast &amp; Blog</span>
          <span class="studio-quad-sub">Podcast Coming Soon</span>
        </a>

        <div class="studio-quad studio-quad-blank" aria-hidden="true"></div>

      </div>

    </div>

  </div>

  <script>
  (function() {
    var overlay = document.getElementById('transmission-overlay');
    if (!overlay) return;
    if (localStorage.getItem('mcpuppy_seen')) {
      overlay.style.display = 'none';
      return;
    }

    function type(id, text, delay, cb) {
      setTimeout(function() {
        var el = document.getElementById(id);
        if (!el) return;
        var i = 0;
        var iv = setInterval(function() {
          el.textContent += text[i]; i++;
          if (i >= text.length) { clearInterval(iv); if (cb) cb(); }
        }, 32);
      }, delay);
    }

    function dismiss() {
      overlay.classList.add('is-done');
      localStorage.setItem('mcpuppy_seen', '1');
      setTimeout(function() { overlay.style.display = 'none'; }, 950);
    }

    type('t1', 'SIGNAL ACQUIRED FROM: ████████████', 300, function() {
      type('t2', 'ORIGIN: INTERPLANETARY CONSTRUCTION CO.', 200, function() {
        type('t3', 'DECRYPTING TRANSMISSION…', 200, function() {
          setTimeout(function() {
            document.getElementById('t-headline').classList.add('is-visible');
            setTimeout(function() {
              document.getElementById('t-sub').classList.add('is-visible');
              setTimeout(dismiss, 2200);
            }, 400);
          }, 600);
        });
      });
    });

    overlay.addEventListener('click', dismiss);
  })();
  </script>

</body>
</html>
