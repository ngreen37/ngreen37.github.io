<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>McPuppy Studios</title>
  <meta name="description" content="McPuppy Studios — Animation, Chess, and Creativity">
  <link rel="icon" href="{{ '/assets/images/favicon.svg' | relative_url }}" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body class="studio-body">

  <div class="studio-page">

    <div class="studio-welcome-bg" aria-hidden="true">WELCOME</div>

    <div class="studio-drifters">
      <a href="{{ '/characters/princess/' | relative_url }}" class="drift-piece" aria-label="Princess character page">♞</a>
      <a href="{{ '/locations/' | relative_url }}" class="drift-piece" aria-label="Locations">♛</a>
      <a href="{{ '/characters/' | relative_url }}" class="drift-piece" aria-label="All characters">♜</a>
      <a href="{{ '/podcast/' | relative_url }}" class="drift-piece" aria-label="Podcast">🎙</a>
      <a href="{{ '/blog/' | relative_url }}" class="drift-piece" aria-label="Blog">✍</a>
    </div>

    <!-- Logo pinned top-left -->
    <div class="studio-corner-logo">
      <img src="{{ '/assets/images/mcpuppy-logo-horizontal.svg' | relative_url }}"
           alt="McPuppy Studios"
           class="studio-corner-img">
    </div>

    <div class="studio-content">

      <!-- Tagline at top center (where logo was) -->
      <div class="studio-tagline" aria-hidden="true">
        <span class="tagline-word">Chess.</span>
        <span class="tagline-word">Blog.</span>
        <span class="tagline-word">Music.</span>
        <span class="tagline-word">Podcast.</span>
        <span class="tagline-word">Animation.</span>
        <span class="tagline-word tagline-main">... A million stories to tell.</span>
      </div>

      <div class="studio-quad-grid">

        <a href="{{ '/pjcc/' | relative_url }}" class="studio-quad">
          <span class="studio-quad-title">PJCC</span>
          <span class="studio-quad-sub">Princess &amp; the Journey<br>to Chess City</span>
        </a>

        <a href="{{ '/chess-lessons/' | relative_url }}" class="studio-quad">
          <span class="studio-quad-title">Chess Lessons</span>
        </a>

        <a href="{{ '/blog/' | relative_url }}" class="studio-quad">
          <span class="studio-quad-title">Podcast &amp; Blog</span>
          <span class="studio-quad-sub">Podcast Coming Soon</span>
        </a>

        <a href="{{ '/about/' | relative_url }}" class="studio-quad">
          <span class="studio-quad-title">About / Contact</span>
        </a>

      </div>

    </div>

  </div>

</body>
</html>
