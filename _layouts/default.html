<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="icon" href="{{ '/assets/images/favicon.svg' | relative_url }}" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body{% if page.body_class %} class="{{ page.body_class }}"{% endif %}>

  <header class="site-header">
    <div class="wrapper header-inner">
      <a class="site-logo" href="{{ '/' | relative_url }}">
        <img src="{{ '/assets/images/mcpuppy-logo-stacked.svg' | relative_url }}"
             alt="McPuppy Studios"
             class="logo-stacked">
      </a>
      <nav class="site-nav">
        <a class="page-link" href="{{ '/pjcc/' | relative_url }}">PJCC</a>
        <a class="page-link" href="{{ '/characters/' | relative_url }}">Characters</a>
        <a class="page-link" href="{{ '/locations/' | relative_url }}">Locations</a>
        <a class="page-link" href="{{ '/evolutions/' | relative_url }}">Evolution Log</a>
        <span class="nav-divider" aria-hidden="true">&#9823;</span>
        <a class="page-link page-link-bw" href="{{ '/projects/' | relative_url }}">Projects</a>
        <a class="page-link page-link-bw" href="{{ '/chess-lessons/' | relative_url }}">Chess Lessons</a>
        <a class="page-link page-link-bw" href="{{ '/podcast/' | relative_url }}">Podcast</a>
        <a class="page-link page-link-bw" href="{{ '/blog/' | relative_url }}">Blog</a>
        <a class="page-link page-link-bw" href="{{ '/about/' | relative_url }}">About</a>
        <a class="page-link page-link-bw" href="{{ '/contact/' | relative_url }}">Contact</a>
      </nav>
    </div>
  </header>

  <main class="page-content">
    <div class="wrapper">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="wrapper footer-inner">
      <img src="{{ '/assets/images/mcpuppy-logo-horizontal.svg' | relative_url }}"
           alt="McPuppy Studios"
           class="logo-horizontal">
      <p class="footer-copy">
        &copy; {{ 'now' | date: "%Y" }} McPuppy Studios. All rights reserved.
      </p>
    </div>
  </footer>

</body>
</html>
