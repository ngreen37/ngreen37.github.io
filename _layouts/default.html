<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

  <header class="site-header">
    <div class="wrapper header-inner">
      <a class="site-title" href="{{ '/' | relative_url }}">PJCC</a>
      <nav class="site-nav">
        <a class="page-link" href="{{ '/blog/' | relative_url }}">Blog</a>
        <a class="page-link" href="{{ '/characters/' | relative_url }}">Characters</a>
        <a class="page-link" href="{{ '/locations/' | relative_url }}">Locations</a>
        <a class="page-link" href="{{ '/projects/' | relative_url }}">Projects</a>
        <a class="page-link" href="{{ '/contact/' | relative_url }}">Contact</a>
      </nav>
    </div>
  </header>

  <main class="page-content">
    <div class="wrapper">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="wrapper footer-inner">
      <p class="footer-tagline">
        <span class="footer-title">Princess and the Journey to Chess City</span><br>
        <span class="footer-studio">&copy; {{ 'now' | date: "%Y" }} McPuppy Studios. All rights reserved.</span>
      </p>
    </div>
  </footer>

</body>
</html>
