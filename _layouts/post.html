---
layout: default
---

<article class="post">

  <div class="post-header">
    <h1>{{ page.title }}</h1>
    <p class="post-meta">
      {{ page.date | date: "%B %d, %Y" }} • {{ page.content | number_of_words | divided_by:200 }} min read
    </p>
  </div>

  <div class="post-content">
    {{ content }}
  </div>

</article>
