---
layout: default
---

<article class="post">

  <!-- Reading header -->
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <p class="post-meta">
      {{ page.date | date: "%B %d, %Y" }} • {{ page.content | number_of_words | divided_by:200 }} min read
    </p>

    {% if page.tags %}
<div class="blog-tags">
  {% for tag in page.tags %}
    <a href="/tags/{{ tag | slugify }}/" class="tag">{{ tag }}</a>
  {% endfor %}
</div>
{% endif %}
  </header>

  <!-- Post content -->
  <div class="post-content">
    {{ content }}
  </div>

</article>
