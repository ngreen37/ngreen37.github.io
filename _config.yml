# Site settings
title: PJCC
description: Website For Princess and the Journey to Chess City
baseurl: ""        # leave empty for root
url: "https://ngreen37.github.io"  
permalink: /:year/:month/:day/:title/

# Navigation
header_pages:
  - index.md
  - projects.md
  - blog.md
  - characters.md
  - locations.md
  - In-Person Chess Lessons.md
  - contact.md






defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      body_class: theme-bw

collections:
  characters:
    output: true
    permalink: /characters/:name/
  locations:
    output: true
    permalink: /locations/:name/
  tag_pages:
    output: true
    permalink: /tags/:name/
  evolutions:
    output: true
    permalink: /evolutions/:name/
# Optional: social links / footer
