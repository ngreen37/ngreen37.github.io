---
layout: default
title: Tags
permalink: /tags/
---

<h1>All Tags</h1>
<ul>
  {% assign sorted_tag_pages = site.tag_pages | sort_by: "title" %}
  {% for tag_page in sorted_tag_pages %}
    <li>
      <a href="{{ tag_page.url }}">{{ tag_page.title }} ({{ site.tags[tag_page.tag] | size }})</a>
    </li>
  {% endfor %}
</ul>
